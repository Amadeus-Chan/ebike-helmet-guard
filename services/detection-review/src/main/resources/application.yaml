server:
  port: 7000

spring:

  profiles:
    active: dev

  application:
    name: detection-review

  cloud:
    nacos:
      server-addr: 127.0.0.1:8848
      discovery:
        namespace: ${spring.profiles.active}
      config:
        namespace: ${spring.profiles.active}
        group: ${spring.application.name}

  servlet:
    multipart:
      enabled: true
      max-request-size: 50MB
      max-file-size: 10MB

  config:
    import:
      - nacos:infra.yaml
      - nacos:internal-auth.yaml
      - nacos:file-store.yaml
      - nacos:model-path.yaml
      - nacos:minio.yaml


mybatis:
  mapper-locations: classpath:mapper/**.xml
  configuration:
    map-underscore-to-camel-case: true



