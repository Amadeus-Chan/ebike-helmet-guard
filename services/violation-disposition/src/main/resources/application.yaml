server:
  port: 8000

spring:
  profiles:
    active: dev
  application:
    name: violation-disposition
  cloud:
    nacos:
      server-addr: 127.0.0.1:8848
      discovery:
        namespace: ${spring.profiles.active}
      config:
        namespace: ${spring.profiles.active}
        group: ${spring.application.name}

  config:
    import:
      - nacos:infra.yaml
      - nacos:internal-auth.yaml
      - nacos:app-code.yaml
      - nacos:access-key.yaml
      - nacos:minio.yaml

mybatis:
  mapper-locations: classpath:mapper/**.xml
  configuration:
    map-underscore-to-camel-case: true

